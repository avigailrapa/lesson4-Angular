<h2>Add New Question</h2>
<form (ngSubmit)="addQuestion()">
  <div>
    <input [(ngModel)]="newQuestion.question" placeholder="Enter question" />
  </div>

  @for (ans of newQuestion.answers; track $index) {
    <input [(ngModel)]="newQuestion.answers[$index]" placeholder="Answer {{ $index + 1 }}" />
  }

  <div>
    <label>Correct Answer (0-3):</label>
    <input type="number" [(ngModel)]="newQuestion.correctAnswer" />
  </div>

  <button>Add Question</button>
</form>
