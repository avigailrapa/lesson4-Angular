@if (realAPI.questions().length === 0) {
  <div class="loading-container">
    <mat-spinner></mat-spinner>
  </div>
} @else {
  <h1>Trivia</h1>
  @for (question of realAPI.questions(); track question.id) {
    <app-question [question]="question"></app-question>
    <mat-divider></mat-divider>
  }
}
